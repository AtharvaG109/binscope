name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: binscope-linux-x86_64.tar.gz
            binary_name: binscope
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_name: binscope-macos-x86_64.tar.gz
            binary_name: binscope
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: binscope-windows-x86_64.zip
            binary_name: binscope.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/
          cp README.md LICENSE dist/
          tar -czf ${{ matrix.archive_name }} -C dist .

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" dist/
          Copy-Item README.md dist/
          Copy-Item LICENSE dist/
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.archive_name }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: ${{ matrix.archive_name }}
